<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draw Confirmation</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap");
      body {
        margin: 0;
        padding: 0;
        background: #e8e8e8;
        font-family: "DM Sans", Arial, sans-serif;
      }
      table {
        border-collapse: collapse;
      }
      .container {
        max-width: 600px;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background: #e8e8e8; padding: 30px 0"
    >
      <tr>
        <td align="center">
          <table
            class="container"
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              max-width: 600px;
              background: #ffffff;
              border-radius: 4px;
              overflow: hidden;
              box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            "
          >
            <!-- BODY -->
            <tr>
              <td
                class="mob-pad"
                style="
                  padding: 36px 32px 10px;
                  color: #333333;
                  font-size: 15px;
                  line-height: 1.7;
                  font-family: &quot;DM Sans&quot;, Arial, sans-serif;
                "
              >
                <p style="margin: 0 0 20px">{{message}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
